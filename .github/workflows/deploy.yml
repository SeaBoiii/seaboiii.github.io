name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Next.js (novel reader)
        working-directory: web
        run: npm run build

      - name: Generate tetris/wordle config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DICTIONARY_URL: ${{ secrets.DICTIONARY_URL }}
        run: |
          : "${SUPABASE_URL:?Missing SUPABASE_URL secret}"
          : "${SUPABASE_ANON_KEY:?Missing SUPABASE_ANON_KEY secret}"
          cat > ./tetris/config.js <<EOF
          window.SUPABASE_URL = "${SUPABASE_URL}";
          window.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
          EOF
          cat > ./wordle/config.js <<EOF
          window.SUPABASE_URL = "${SUPABASE_URL}";
          window.SUPABASE_ANON_KEY = "${SUPABASE_ANON_KEY}";
          EOF
          if [ -n "${DICTIONARY_URL}" ]; then
            echo "window.DICTIONARY_URL = \"${DICTIONARY_URL}\";" >> ./wordle/config.js
          fi

      - name: Assemble deploy directory
        run: |
          set -euo pipefail
          mkdir -p deploy
          # 1) Overlay legacy static root files first (profile + mini-projects)
          for item in \
              index.html foryou.html hny.html vday.html \
              site.webmanifest favicon.ico \
              favicon-16x16.png favicon-32x32.png \
              apple-touch-icon.png \
              android-chrome-192x192.png android-chrome-512x512.png \
              tetris wordle images img css js README.md; do
            if [ -e "$item" ]; then
              cp -R "$item" "deploy/"
            fi
          done
          # 2) Copy Next.js static export on top (so /novel/* and /index.html redirect take precedence)
          cp -R web/out/. deploy/
          # 3) Disable Jekyll on Pages so _next/ assets are served untouched
          touch deploy/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
